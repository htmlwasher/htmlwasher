name: release-npm

# Publishes the `trafilaturacore` npm package via npm Trusted Publishing (OIDC).
# MUST run only AFTER the napi-refresh PR opened by build-native.yml for the
# release commit is merged, so the tsup bundle stages current `.node` prebuilds
# under dist/native/. Hence workflow_dispatch (not a `v*` tag trigger). The
# /projects:trafilatura:publish:npmjs command encodes this gate.
#
# NOTE: the published package carries a `prepublishOnly` guard (exit 1) as a
# deliberate backstop — publishing is intentionally inert until that guard is
# relaxed. Authored-but-inert; never dispatched in normal operation.
#
# The workflow filename (release-npm.yml) and the `npm` environment are bound to
# the trusted-publisher config on npmjs.com — renaming either silently breaks
# authentication.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (vX.Y.Z, or the FULL 40-char merged refresh commit SHA)"
        required: true
        type: string

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write # OIDC trusted publishing — no token secret
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          # Tags are needed for the version-consistency check below.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false # no committed pnpm-lock.yaml (gitignored)
          # Writes the runner .npmrc; npm >= 11.5.1 then detects the OIDC
          # environment and exchanges a short-lived token at publish time.
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1 — never trust the bundled npm.
      - name: Upgrade npm
        run: npm install -g npm@latest && npm --version

      - name: Build the CLI bundle
        run: |
          # pnpm-lock.yaml is not committed in this repo, so resolve fresh (no
          # --frozen-lockfile, matching the other workflows' install strategy).
          pnpm install
          # Build trafilaturacore + its workspace deps in dependency order
          # (turbo). The native build self-skips to the committed prebuilds when
          # no Rust toolchain is present; the tsup bundle then stages those
          # prebuilds + the napi loader into dist/native/.
          pnpm exec turbo run build --filter=trafilaturacore

      - name: Version consistency check
        working-directory: packages/trafilaturacore
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: ${VERSION}"
          # The dispatched ref must contain the Release commit for this version
          # — guards against dispatching a stale ref after a newer release.
          git merge-base --is-ancestor "refs/tags/v${VERSION}" HEAD
          # npm versions are permanently reserved — fail early and loudly.
          if npm view "trafilaturacore@${VERSION}" version >/dev/null 2>&1; then
            echo "trafilaturacore@${VERSION} already exists on npm" >&2
            exit 1
          fi

      # Safety gate (mirrors release-pypi.yml's wheel verify): the packed
      # tarball must carry dist/cli.js + dist/index.js plus one .node per
      # committed NATIVE prebuild platform (the wasm32-wasi target ships a .wasm
      # loaded on demand, not staged here) — or consumers get a CLI without its
      # native module.
      - name: Pack and verify the tarball
        working-directory: packages/trafilaturacore
        run: |
          set -euo pipefail
          # devDependencies carry the workspace:* native specifier; strip them
          # from the published manifest (consumers never install devDeps).
          npm pkg delete devDependencies
          npm pack
          TARBALL=$(ls trafilaturacore-*.tgz)
          # List once into a variable — `tar | grep -q` under pipefail fails on
          # success: grep -q exits at first match, tar dies on SIGPIPE.
          LISTING=$(tar -tzf "$TARBALL")
          grep -qx "package/dist/cli.js" <<< "$LISTING"
          grep -qx "package/dist/index.js" <<< "$LISTING"
          COUNT=0
          for target in $(ls native/npm); do
            # Only the native targets carry a committed .node; skip the rest.
            if [ -f "native/npm/${target}/trafilaturacore-native.${target}.node" ]; then
              grep -qx "package/dist/native/trafilaturacore-native.${target}.node" <<< "$LISTING"
              COUNT=$((COUNT + 1))
            fi
          done
          if [ "$COUNT" -eq 0 ]; then
            echo "no native .node prebuilds staged in the tarball" >&2
            exit 1
          fi
          echo "tarball OK: cli.js + index.js + ${COUNT} native prebuilds"
          # npm publish re-packs from this directory; keep one source of truth.
          rm "$TARBALL"

      - name: Publish via OIDC trusted publishing
        working-directory: packages/trafilaturacore
        # Provenance is automatic with trusted publishing, but the explicit flag
        # makes a provenance failure abort the publish instead of silently
        # shipping without attestation. Requires the `repository` field in
        # package.json to match this repo exactly. NOTE: the package's
        # `prepublishOnly` guard (exit 1) intentionally blocks this step until
        # relaxed — publishing is inert by design.
        run: npm publish --provenance
